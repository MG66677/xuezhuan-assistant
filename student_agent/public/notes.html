<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学赚助手 - 笔记管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/lucide@0.475.0/font/lucide.css">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<aside class="sidebar">
    <div class="sidebar-header"><div class="logo"><i class="lci lci-graduation-cap"></i><span>学赚助手</span></div></div>
    <nav class="sidebar-nav">
        <a href="/" class="nav-item"><i class="lci lci-layout-dashboard"></i><span>仪表盘</span></a>
        <a href="/chat" class="nav-item"><i class="lci lci-message-circle"></i><span>AI 对话</span></a>
        <div class="nav-divider"></div>
        <div class="nav-label">学业工具</div>
        <a href="/notes" class="nav-item active"><i class="lci lci-notebook"></i><span>笔记管理</span></a>
        <a href="/tasks" class="nav-item"><i class="lci lci-list-checks"></i><span>任务看板</span></a>
        <a href="/flashcards" class="nav-item"><i class="lci lci-brain"></i><span>复习闪卡</span></a>
        <a href="/schedule" class="nav-item"><i class="lci lci-calendar"></i><span>课程表</span></a>
        <div class="nav-divider"></div><div class="nav-label">赚钱工具</div>
        <a href="/projects" class="nav-item"><i class="lci lci-briefcase"></i><span>项目管理</span></a>
    </nav>
    <div class="sidebar-footer"><button class="mode-toggle" onclick="toggleMode()"><i class="lci lci-repeat"></i><span id="modeLabel">学业</span></button></div>
</aside>
<main class="main-content">
    <div class="page-header"><h1><i class="lci lci-notebook"></i> 笔记管理</h1><button class="btn btn-primary" onclick="openNoteEditor()"><i class="lci lci-plus"></i> 新建笔记</button></div>
    <div class="toolbar">
        <div class="search-bar"><i class="lci lci-search"></i><input type="text" id="searchNotes" placeholder="搜索笔记..." oninput="searchNotes()"></div>
    </div>
    <div class="notes-grid" id="notesGrid"></div>
</main>
<div class="modal-overlay" id="noteModal" style="display:none" onclick="closeModalOutside(event)">
    <div class="modal">
        <div class="modal-header"><input type="text" id="noteTitle" placeholder="笔记标题" class="modal-title-input"><button class="btn btn-ghost" onclick="closeModal()"><i class="lci lci-x"></i></button></div>
        <div class="modal-body">
            <textarea id="noteContent" placeholder="开始写笔记..." class="modal-textarea"></textarea>
            <input type="text" id="noteTags" placeholder="标签（逗号分隔）" class="modal-tags-input">
        </div>
        <div class="modal-footer">
            <button class="btn btn-ghost" onclick="deleteNote()" id="deleteNoteBtn" style="color:#ef4444;display:none">删除</button>
            <div class="modal-footer-right"><button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveNote()">保存</button></div>
        </div>
    </div>
</div>
<script src="/script.js"></script>
</body>
</html>
