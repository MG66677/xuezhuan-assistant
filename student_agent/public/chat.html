<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学赚助手 - AI 对话</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/lucide@0.475.0/font/lucide.css">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<aside class="sidebar">
    <div class="sidebar-header"><div class="logo"><i class="lci lci-graduation-cap"></i><span>学赚助手</span></div></div>
    <nav class="sidebar-nav">
        <a href="/" class="nav-item"><i class="lci lci-layout-dashboard"></i><span>仪表盘</span></a>
        <a href="/chat" class="nav-item active"><i class="lci lci-message-circle"></i><span>AI 对话</span></a>
        <div class="nav-divider"></div>
        <div class="nav-label">学业工具</div>
        <a href="/notes" class="nav-item"><i class="lci lci-notebook"></i><span>笔记管理</span></a>
        <a href="/tasks" class="nav-item"><i class="lci lci-list-checks"></i><span>任务看板</span></a>
        <a href="/flashcards" class="nav-item"><i class="lci lci-brain"></i><span>复习闪卡</span></a>
        <a href="/schedule" class="nav-item"><i class="lci lci-calendar"></i><span>课程表</span></a>
        <div class="nav-divider"></div>
        <div class="nav-label">赚钱工具</div>
        <a href="/projects" class="nav-item"><i class="lci lci-briefcase"></i><span>项目管理</span></a>
    </nav>
    <div class="sidebar-footer"><button class="mode-toggle" onclick="toggleMode()"><i class="lci lci-repeat"></i><span id="modeLabel">学业</span></button></div>
</aside>
<main class="main-content">
    <div class="page-header">
        <h1><i class="lci lci-message-circle"></i> AI 对话</h1>
        <button class="btn btn-ghost" onclick="clearChat()"><i class="lci lci-trash-2"></i> 清空</button>
    </div>
    <div class="chat-container">
        <div class="chat-messages" id="chatMessages">
            <div class="msg-thinking" id="thinkingIndicator" style="display:none">
                <div class="msg-avatar"><i class="lci lci-bot"></i></div>
                <div class="thinking-dots"><span></span><span></span><span></span></div>
            </div>
        </div>
        <div class="chat-suggestions">
            <button class="suggestion-chip" onclick="sendSuggestion('帮我整理今天的待办')">📋 整理待办</button>
            <button class="suggestion-chip" onclick="sendSuggestion('怎么开始做线上副业')">💡 副业建议</button>
            <button class="suggestion-chip" onclick="sendSuggestion('帮我规划期末复习')">📚 复习规划</button>
            <button class="suggestion-chip" onclick="sendSuggestion('保存笔记：今天学了数据结构')">📝 记笔记</button>
        </div>
        <div class="chat-input">
            <textarea id="chatInput" rows="1" placeholder="输入消息..." onkeydown="handleKey(event)"></textarea>
            <button class="btn btn-primary" onclick="sendMessage()"><i class="lci lci-send"></i></button>
        </div>
    </div>
</main>
<script src="/script.js"></script>
</body>
</html>
